################################################################################
# OpenRouter Backend Configuration
################################################################################
#
# This file defines the model specifications for OpenRouter models.
# It contains model definitions for various LLM and image generation models
# accessible through the OpenRouter API.
#
# Configuration structure:
# - Each model is defined in its own section with the model name as the header
# - Headers with dots or colons must be quoted (e.g., ["anthropic/claude-3.5-sonnet"])
# - Model costs are in USD per million tokens (input/output)
#
# Documentation: https://docs.pipelex.com
# Support: https://go.pipelex.com/discord
#
################################################################################

################################################################################
# MODEL DEFAULTS
################################################################################

[defaults]
model_type = "llm"
sdk = "openai"
structure_method = "instructor/openai_tools"
thinking_mode = "none"

